version: 2.1

executors:
  build-executor:
    machine:
      image: ubuntu-2404:current
    resource_class: xlarge
    working_directory: /home/circleci/project

commands:
  start-commands:
    steps:
      - send-notification:
          message: "CI run started"
      - send-notification:
          message: "<${CIRCLE_BUILD_URL}|logs>"
      - run:
          name: Create compare link
          command: |
            DEPLOYS_URL_API="https://api.github.com/repos/Farmbot/Farmbot-Web-App/deployments"
            COMPARE_URL_WEB="https://github.com/Farmbot/Farmbot-Web-App/compare/"
            data=$(curl -fsS "$DEPLOYS_URL_API") || data="[]"
            last_sha=$(printf "%s" "$data" | python -c 'import json,sys; data=json.loads(sys.stdin.read() or "[]"); deploy_index=0; sha=(data[deploy_index] or {}).get("sha"); print(sha or "")')
            compare_url="$COMPARE_URL_WEB$last_sha...${CIRCLE_SHA1}"
            echo "$compare_url"
            echo "export COMPARE_URL='$compare_url'" >> "$BASH_ENV"
      - send-notification:
          message: "<$COMPARE_URL|diff>"
  send-notification:
    parameters:
      message:
        type: string
      when:
        type: enum
        enum: ["on_success", "on_fail", "always"]
        default: "always"
    steps:
      - when:
          condition:
            equal: [staging, << pipeline.git.branch >>]
          steps:
            - run:
                name: "Send notification: << parameters.message >>"
                when: << parameters.when >>
                command: |
                  if [ -n "$SLACK_WEBHOOK_URL" ]; then
                    curl -fsS -X POST -H "Content-Type: application/json" \
                      --data "{\"text\":\"<< parameters.message >>\",\"channel\":\"#software\"}" \
                      "$SLACK_WEBHOOK_URL" || true
                  fi
  build-commands:
    steps:
      - run:
          name: Build and Install Deps
          command: |
            mv .circleci/circle_envs .env
            echo -e '\ndocker_volumes/db/pg_wal/*' >> .dockerignore
            sudo docker compose build web
            if sudo docker compose run --rm web bash -lc '\
              gem install bundler && \
              bundle install && \
              bun install \
            '; then
              echo "export SETUP_OK=true" >> "$BASH_ENV"
            else
              echo "export SETUP_OK=false" >> "$BASH_ENV"
              exit 1
            fi
      - run:
          name: Run setup tasks
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "export SETUP_OK=false" >> "$BASH_ENV"
              exit 1
            fi

            if sudo docker compose run --rm web bash -lc '\
              bundle exec rails db:create && \
              bundle exec rails db:migrate && \
              bundle exec rake keys:generate \
            '; then
              echo "export SETUP_OK=true" >> "$BASH_ENV"
            else
              echo "export SETUP_OK=false" >> "$BASH_ENV"
              exit 1
            fi
  rspec-commands:
    steps:
      - run:
          name: Run Ruby Tests
          command: |
            sudo docker compose run --rm web bundle exec rspec spec --format progress --format RspecJunitFormatter --out test-results/rspec.xml
      - run:
          name: Check app coverage status
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            sudo docker compose run --rm web bundle exec rake check_file_coverage:api || [ $CIRCLE_BRANCH == "staging" ]
          when: always
      - run:
          name: Upload app coverage to Codecov
          command: |
            curl https://keybase.io/codecovsecurity/pgp_keys.asc | gpg --no-default-keyring --keyring trustedkeys.gpg --import
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            curl -Os https://uploader.codecov.io/latest/linux/codecov.SHA256SUM
            curl -Os https://uploader.codecov.io/latest/linux/codecov.SHA256SUM.sig
            gpgv codecov.SHA256SUM.sig codecov.SHA256SUM
            shasum -a 256 -c codecov.SHA256SUM
            chmod +x codecov
            ./codecov -t $CODECOV_TOKEN -f coverage_api/coverage.xml
  js-test-commands:
    steps:
      - run:
          name: Run JS tests
          when: always
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            sudo docker compose run --rm web bun test --reporter=junit --reporter-outfile=test-results/junit.xml
            echo 'export COVERAGE_AVAILABLE=true' >> $BASH_ENV
  lint-commands:
    steps:
      - run:
          name: Run Ruby Linters
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            sudo docker compose run --rm web bun run ruby-check
          when: always
      - run:
          name: Run JS Linters
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            sudo docker compose run --rm web bun run linters
          when: always
  bun-build-commands:
    steps:
      - run:
          name: Check bun build
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            sudo docker compose run --rm web bundle exec rake assets:precompile 2>&1 | tee assets_precompile.log
            printf -- '-%.0s' {1..50}; printf '\n'
            if grep -Ei '^(warn|error):' assets_precompile.log; then
              exit 1
            fi
          when: always
  coverage-commands:
    steps:
      - run:
          name: Check frontend coverage status
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            sudo docker compose run --rm -e CIRCLE_SHA1="$CIRCLE_SHA1" -e CIRCLE_BRANCH="$CIRCLE_BRANCH" -e CIRCLE_PULL_REQUEST="$CIRCLE_PULL_REQUEST" web bundle exec rake coverage:run || [ $CIRCLE_BRANCH == "staging" ]
          when: always
      - run:
          name: Check frontend file coverage status
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            changed=$(git diff --name-only staging...HEAD | tr '\n' ',' | sed 's/,$//') || true
            sudo docker compose run --rm -e CHANGED_FILES="$changed" web bundle exec rake check_file_coverage:fe || true
          when: always
      - run:
          name: Report frontend coverage to Coveralls
          command: |
            if [ "$CIRCLE_BRANCH" == "staging" ]; then set +eo pipefail; fi
            if [ "$COVERAGE_AVAILABLE" ] && [ "$COVERALLS_REPO_TOKEN" ]
            then
              curl -sLO https://github.com/coverallsapp/coverage-reporter/releases/latest/download/coveralls-linux.tar.gz
              curl -sLO https://github.com/coverallsapp/coverage-reporter/releases/latest/download/coveralls-checksums.txt
              cat coveralls-checksums.txt | grep coveralls-linux.tar.gz | sha256sum --check
              tar -xzf coveralls-linux.tar.gz
              ./coveralls report coverage_fe/lcov.info
            fi
            if [ "$CIRCLE_BRANCH" == "staging" ]; then echo; fi
          when: always # change to `on_success` for a stricter comparison
      - restore_cache:
          keys:
            - fe-coverage-staging-
      - run:
          name: Get current frontend coverage value
          when: always
          command: |
            if [ -z "$COVERAGE_AVAILABLE" ]; then
              echo "skipping"
              exit 0
            fi
            eval "$(awk -F: '/^LH:/ { covered += $2 } /^LF:/ { total += $2 } END { printf "COVERED=%d\nTOTAL=%d\n", covered, total }' coverage_fe/lcov.info)"
            FE_VALUE=$(awk "BEGIN { printf \"%.2f\", ($COVERED / $TOTAL) * 100 }")
            echo "Covered lines: $COVERED, Total lines: $TOTAL, Coverage: $FE_VALUE%"
            echo "export COVERED=$COVERED" >> "$BASH_ENV"
            echo "export TOTAL=$TOTAL" >> "$BASH_ENV"
            echo "export FE_VALUE=$FE_VALUE" >> "$BASH_ENV"
      - run:
          name: Load previous frontend coverage value
          when: always
          command: |
            if [ -f fe_coverage.csv ]; then
              PREV_FE=$(python -c 'import csv; f=open("fe_coverage.csv", newline=""); r=csv.reader(f); next(r, None); rows=[float(row[0]) for row in r if row and row[0]]; print(f"{rows[-1]:.2f}" if rows else "98.7")')
            else
              PREV_FE=98.7
            fi
            echo "Previous value: $PREV_FE%"
            echo "export PREV_FE_VALUE=$PREV_FE" >> $BASH_ENV
      - run:
          name: Compare frontend coverage value
          when: always
          command: |
            if [ -z "$COVERAGE_AVAILABLE" ]; then
              echo "skipping"
              exit 0
            fi
            percent_change=$(python -c 'import os; fe=float(os.environ.get("FE_VALUE","0") or 0); prev=float(os.environ.get("PREV_FE_VALUE","0") or 0); print("n/a" if prev==0 else f"{((fe-prev)/prev)*100:.2f}")')
            echo "$FE_VALUE% ($percent_change% change)"
            echo "export PERCENT_FE_CHANGE=$percent_change" >> "$BASH_ENV"
      - run:
          name: Save new frontend coverage value
          when: always
          command: |
            if [ -z "$COVERAGE_AVAILABLE" ]; then
              echo "skipping"
              exit 0
            fi
            echo "$FE_VALUE"
            if [ ! -f fe_coverage.csv ]; then
              printf '%s\n' "percent,covered lines,total lines,percent change" > fe_coverage.csv
            fi
            printf '%s\n' "$FE_VALUE,$COVERED,$TOTAL,$PERCENT_FE_CHANGE" >> fe_coverage.csv
            cat fe_coverage.csv
      - save_cache:
          key: fe-coverage-{{ .Branch }}-{{ epoch }}
          paths:
            - fe_coverage.csv
          when: always
      - store_artifacts:
          path: fe_coverage.csv
          destination: fe_coverage.csv
  render-commands:
    steps:
      - run:
          name: Start services
          when: always
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            sudo docker compose up -d
            sudo docker compose ps
      - run:
          name: Install playwright
          when: always
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            sudo docker compose exec -e PLAYWRIGHT_BROWSERS_PATH=0 web bunx playwright install chromium --with-deps
      - run:
          name: Wait for load
          when: always
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            for i in $(seq 1 90); do
              if curl -fsS "http://127.0.0.1:3000/promo" >/dev/null; then
                echo "web is up"
                exit 0
              fi
              sleep 2
            done

            echo "timeout"
            sudo docker compose logs --no-color --tail=300 web
            exit 1
      - run:
          name: Run playwright
          when: always
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "skipping"
              exit 0
            fi
            attempts=2
            for _ in $(seq 1 "$attempts"); do
              url="http://localhost:3000/promo?sizePreset=Genesis+XL&promoSpread=true"
              echo "Attempting FPS check via ${url}"
              if ! sudo docker compose exec web curl -I "${url}" >/dev/null; then
                continue
              fi

              if ! fps_output=$(sudo docker compose exec -e PLAYWRIGHT_BROWSERS_PATH=0 web bun scripts/fps.js "${url}" "tmp/promo.png" "tmp/fps_plot.png"); then
                echo "${fps_output}"
                continue
              fi
              echo "${fps_output}"

              fps_value=$(echo "${fps_output}" | awk -F= '/^FPS_VALUE=/{print $2; exit}')
              scene_metrics=$(echo "${fps_output}" | awk -F= '/^SCENE_METRICS=/{print $2; exit}')
              echo "export FPS_VALUE=${fps_value}" >> "$BASH_ENV"
              echo "export SCENE_METRICS=\"${scene_metrics}\"" >> "$BASH_ENV"

              exit 0
            done

            echo "FPS check failed for all URLs"
            exit 1
      - restore_cache:
          keys:
            - fps_value-staging-
      - run:
          name: Load previous fps value
          when: always
          command: |
            if [ -f fps_value.txt ]; then
              PREV=$(cat fps_value.txt)
            else
              PREV=0.75
            fi
            echo "Previous value: $PREV fps"
            echo "export PREV_VALUE=$PREV" >> $BASH_ENV
      - run:
          name: Compare fps value
          when: always
          command: |
            percent_change=$(python -c 'import os; fps=float(os.environ.get("FPS_VALUE","0") or 0); prev=float(os.environ.get("PREV_VALUE","0") or 0); print("n/a" if prev==0 else f"{((fps-prev)/prev)*100:.2f}")')
            echo "$FPS_VALUE fps ($percent_change% change)"
            echo "export PERCENT_CHANGE=$percent_change" >> "$BASH_ENV"
      - run:
          name: Save new fps value
          command: |
            echo "$FPS_VALUE"
            echo "$FPS_VALUE" > fps_value.txt
            if [ ! -f scene_metrics.csv ]; then
              printf '%s\n' "epoch, FPS, Calls, Triangles, Points, Lines, Geometries, Textures, Objects, Meshes, Instanced meshes" > scene_metrics.csv
            fi
            printf '%s\n' "$SCENE_METRICS" >> scene_metrics.csv
            cat scene_metrics.csv
      - save_cache:
          key: fps_value-{{ .Branch }}-{{ epoch }}
          paths:
            - fps_value.txt
            - scene_metrics.csv
      - send-notification:
          message: "$FPS_VALUE fps (${PERCENT_CHANGE}% change)"
      - run:
          name: On failure
          when: on_fail
          command: |
            if [ "$SETUP_OK" != "true" ]; then
              echo "setup failed"
              exit 0
            fi
            sudo docker compose ps
            sudo docker compose logs --no-color --tail=500
      - store_artifacts:
          path: tmp/promo.png
          destination: promo_xl.png
      - store_artifacts:
          path: tmp/fps_plot.png
          destination: fps_plot.png
      - store_artifacts:
          path: scene_metrics.csv
          destination: scene_metrics.csv
  end-commands:
    steps:
      - run:
          name: Fetch image artifact URL
          command: |
            project_slug="gh/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
            artifacts_json=$(curl -fsS \
              -H "Accept: application/json" \
              "https://circleci.com/api/v2/project/${project_slug}/${CIRCLE_BUILD_NUM}/artifacts")
            mapfile -t artifact_urls < <(printf "%s" "$artifacts_json" | python -c 'import json,sys; print("\n".join(item.get("url", "") for item in (json.load(sys.stdin).get("items") or [])))')
            url_for() {
              for url in "${artifact_urls[@]}"; do [[ "$url" == *$1 ]] && { echo "$url"; return; }; done
            }
            screenshot_url="$(url_for "promo*.png")"
            fps_plot_url="$(url_for "fps_plot.png")"
            echo $screenshot_url
            echo $fps_plot_url
            echo "export SCREENSHOT_URL='$screenshot_url'" >> "$BASH_ENV"
            echo "export FPS_PLOT_URL='$fps_plot_url'" >> "$BASH_ENV"
      - send-notification:
          message: "CI run succeeded"
          when: on_success
      - send-notification:
          message: "<$SCREENSHOT_URL|screenshot>"
          when: on_success
      - send-notification:
          message: "<$FPS_PLOT_URL|fps>"
          when: on_success
      - send-notification:
          message: "CI run failed"
          when: on_fail



workflows:
  version: 2
  build_and_test:
    # max_auto_reruns: 1
    jobs:
      - all

jobs:
  all:
    executor: build-executor
    steps:
      - start-commands
      - checkout
      - run: mkdir -p test-results
      - build-commands
      - rspec-commands
      - lint-commands
      - bun-build-commands
      - js-test-commands
      - store_test_results:
          path: test-results
      - coverage-commands
      - render-commands
      - end-commands
