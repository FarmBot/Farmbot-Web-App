name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up environment file
        run: mv .circleci/circle_envs .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker_configs/api.Dockerfile
          load: true
          tags: farmbot_web:latest
          cache-from: type=gha,scope=farmbot-web
          cache-to: type=gha,mode=max,scope=farmbot-web

      - name: Cache bundle
        uses: actions/cache@v4
        with:
          path: docker_volumes/bundle_cache
          key: bundle-${{ runner.os }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            bundle-${{ runner.os }}-

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install deps
        run: |
          sudo docker compose run --rm web bash -lc '
            gem install bundler &&
            bundle install &&
            bun install
          '

      - name: Run setup tasks
        run: |
          sudo docker compose run --rm web bash -lc '
            bundle exec rails db:create &&
            bundle exec rails db:migrate &&
            bundle exec rake keys:generate
          '
          mkdir -p test-results

      - name: Run Ruby linters
        run: sudo docker compose run --rm web bun run ruby-check

      - name: Run Ruby tests
        run: sudo docker compose run --rm web bundle exec rspec spec --format progress --format RspecJunitFormatter --out test-results/rspec.xml

      - name: Run JS linters
        run: sudo docker compose run --rm web bun run linters

      - name: Check bun build
        run: sudo docker compose run --rm web bundle exec rake assets:precompile 2>&1 | tee assets_precompile.log

      - name: Run JS tests
        run: sudo docker compose run --rm web bun test --reporter=junit --reporter-outfile=test-results/junit.xml

      - name: Start services
        run: |
            sudo docker compose up -d
            sudo docker compose ps

      - name: Install playwright
        run: sudo docker compose exec -T -e PLAYWRIGHT_BROWSERS_PATH=0 web bunx playwright install chromium --with-deps

      - name: Wait for load
        run: |
          for i in $(seq 1 90); do
              if curl -fsS "http://127.0.0.1:3000/promo" >/dev/null; then
                echo "web is up"
                exit 0
              fi
              sleep 2
            done
          echo "web did not become ready"
          exit 1

      - name: Run playwright
        run: |
          attempts=2
            for _ in $(seq 1 "$attempts"); do
              url="http://localhost:3000/promo?sizePreset=Genesis+XL&promoSpread=true"
              echo "Attempting FPS check via ${url}"
              if ! sudo docker compose exec -T web curl -I "${url}" >/dev/null; then
                continue
              fi

              if ! fps_output=$(sudo docker compose exec -T -e PLAYWRIGHT_BROWSERS_PATH=0 web bun scripts/fps.js "${url}" "tmp/promo.png" "tmp/fps_plot.png"); then
                echo "${fps_output}"
                continue
              fi
              echo "${fps_output}"

              fps_value=$(echo "${fps_output}" | awk -F= '/^FPS_VALUE=/{print $2; exit}')
              scene_metrics=$(echo "${fps_output}" | awk -F= '/^SCENE_METRICS=/{print $2; exit}')
              echo "FPS_VALUE=${fps_value}" >> "$GITHUB_ENV"
              echo "SCENE_METRICS=${scene_metrics}" >> "$GITHUB_ENV"

              exit 0
            done
          echo "FPS check failed"
          exit 1

      - name: View values
        run: |
          echo $FPS_VALUE
          echo $SCENE_METRICS

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: images
          path: |
            tmp/promo.png
            tmp/fps_plot.png
          if-no-files-found: warn
